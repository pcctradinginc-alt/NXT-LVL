name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          NXT_OFFLINE: "1"
        run: pytest tests/ -q

      - name: Dry-run smoke test (offline, no secrets)
        env:
          NXT_OFFLINE: "1"
        run: python -m src.main --dry-run
