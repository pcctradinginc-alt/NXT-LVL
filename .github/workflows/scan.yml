name: Daily AI Scan

on:
  schedule:
    # 11:30 UTC = before US market open, Mon-Fri
    - cron: "30 11 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRADIER_API_KEY: ${{ secrets.TRADIER_API_KEY }}
          TRADIER_ENV: ${{ vars.TRADIER_ENV }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python -m src.main

      - name: Commit and push data/ if changed
        run: |
          git config user.name "nxt-lvl-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update signal tracking data [skip ci]"
          git diff --cached --quiet || git push
