# NXT LVL — AI Next-Stage Beneficiary Scanner
# Configuration: universe, stages, scoring weights, thresholds.
# See CONCEPT.md for the rationale behind these values.

stages:
  - id: 1
    name: "Compute / Halbleiter (Training)"
    tickers: ["NVDA", "AMD", "AVGO", "TSM"]
    keywords: ["gpu training", "ai chip", "semiconductor", "accelerator", "hbm"]

  - id: 2
    name: "Datacenter-Infrastruktur"
    tickers: ["VRT", "DELL", "ANET", "MU", "SMCI"]
    keywords: ["datacenter", "data center", "server infrastructure", "networking switch", "rack"]

  - id: 3
    name: "Energie / Kühlung / Netz"
    tickers: ["VST", "CEG", "GEV", "ETN", "PWR", "MOD"]
    keywords: ["power", "cooling", "grid", "nuclear", "datacenter energy"]

  - id: 4
    name: "Inference / Netzwerk / Edge"
    tickers: ["MRVL", "CRDO", "ALAB", "COHR"]
    keywords: ["inference", "serving", "vllm", "edge ai", "quantization"]

  - id: 5
    name: "Software / Agenten / Daten"
    tickers: ["PLTR", "NOW", "DDOG", "MDB", "SNOW"]
    keywords: ["agents", "agentic", "rag", "orchestration", "vector database"]

  - id: 6
    name: "Vertikale KI-Adoption"
    tickers: ["ISRG", "CRWD", "PANW", "TER"]
    keywords: ["ai adoption", "vertical ai", "healthcare ai", "cybersecurity ai", "enterprise copilot"]

  - id: 7
    name: "Robotik / Physical AI"
    tickers: ["SYM", "ROK", "TER", "TSLA"]
    keywords: ["robotics", "humanoid", "embodied", "physical ai", "autonomous"]

capex_companies:
  - MSFT
  - GOOGL
  - AMZN
  - META
  - ORCL
  - NVDA

scoring:
  weights:
    breadth: 0.20
    momentum: 0.20
    stage_fit: 0.15
    divergence: 0.15
    option_quality: 0.10
    emergence: 0.20
  # Calibrated after the pre-gate enrichment fix (divergence + emergence are
  # now computed from real data BEFORE the gate, not just for an
  # already-selected top pick), which lifts realistic scores meaningfully
  # above the old placeholder-driven baseline. 60 is the new bar.
  signal_threshold: 60
  min_sources: 2
  cooldown_days: 14
  # Data-quality gate (#17): suppress the signal outright (instead of
  # spending a Tradier call + emitting a low-confidence trade) when the
  # digest's deterministic data-quality score is below this bar.
  min_data_quality: 45
  # Signal-clustering gate (#20): require at least this many credible
  # candidates (total_score >= cluster_score_bar) sharing the top pick's
  # stage/theme, so a genuinely emergent theme lights up more than one name
  # rather than a single possibly-noisy outlier.
  cluster_min_members: 2
  cluster_score_bar: 45
  # Machine-checkable-claims gate (#18): floor of the total_score dampening
  # factor applied when a candidate's LLM-proposed `claims` don't verify
  # against the digest (see src/analysis/phases.py verify_claims). A
  # candidate with no claims at all is unaffected (fraction=1.0 -> factor=1.0).
  claims_conviction_floor: 0.5

options:
  dte_min: 90
  dte_max: 180
  delta_min: 0.60
  delta_max: 0.70
  min_open_interest: 100
  max_spread_pct: 0.10
  # Structure-selection layer (deterministic "cost & structure" EV check,
  # see src/analysis/structures.py): how much richer than realized vol the
  # option's IV must be before we prefer a call spread over a plain long
  # call, which delta to target for the spread's short leg, and how close
  # (as a fraction of the option's own DTE) an earnings date must be to flag
  # the earnings-trap risk note.
  max_iv_realized_ratio: 1.6
  spread_short_delta: 0.32
  earnings_trap_dte_fraction: 0.34

tracking:
  close_after_trading_days: 60
  close_at_dte: 40

# ---------------------------------------------------------------------------
# Sector benchmarks (#11): map each 7-stage watchlist stage to the ETF a
# signal from that stage should be measured against (instead of always SPY).
# `default` is used for candidates with no/unknown stage_id.
# ---------------------------------------------------------------------------

benchmarks:
  1: SOXX
  2: SOXX
  3: XLU
  4: SOXX
  5: IGV
  6: IGV
  7: ITA
  default: SPY

